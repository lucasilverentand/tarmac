name: Format

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-format:
    name: swift-format
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          swift format lint --strict --recursive Sources Tests
