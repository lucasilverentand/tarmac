name: Secret Scanning

on:
  pull_request:
  push:
    branches: [main]

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@v3.94.1
        with:
          extra_args: --only-verified
