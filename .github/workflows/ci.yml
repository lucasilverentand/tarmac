name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          install_args: tuist

      - name: Cache Tuist and DerivedData
        uses: actions/cache@v5
        with:
          path: |
            ~/.tuist
            DerivedData
          key: ${{ runner.os }}-tuist-${{ hashFiles('Project.swift', 'Tuist.swift') }}
          restore-keys: |
            ${{ runner.os }}-tuist-

      - name: Generate project
        run: tuist generate --no-open

      - name: Build
        run: |
          xcodebuild build \
            -scheme Tarmac \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_SWIFT_FLAGS='$(inherited) -warnings-as-errors' \
          | xcpretty

      - name: Test
        run: |
          xcodebuild test \
            -scheme Tarmac \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
          | xcpretty

      - name: Coverage summary
        if: always()
        run: |
          if [ -d "TestResults.xcresult" ]; then
            xcrun xccov view --report --json TestResults.xcresult > coverage.json
            echo "### Code Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            xcrun xccov view --report TestResults.xcresult | head -30 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
